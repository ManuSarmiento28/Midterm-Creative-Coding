<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Space</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: black;
      color: white;
    }

    #canvas-holder {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    nav {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: white;
      border: 1px solid white;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.35);
      transition: 0.2s;
    }

    nav a:hover {
      background: white;
      color: black;
    }

    .bottom-box {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: min(700px, 90%);
    }

    .subtitle {
      background: rgba(0, 0, 0, 0.35);
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 20px;
      line-height: 1.5;
    }


    @media (max-width: 700px) {
      .project-links {
        flex-direction: column;
        align-items: center;
      }

      .bottom-box {
        bottom: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-holder"></div>

  <nav>
    <a href="project1/index.html">PROJECT 1</a>
    <a href="project2/index.html">PROJECT 2</a>
    <a href="project3/index.html">PROJECT 3</a>
  </nav>

  <div class="bottom-box">
    <div class="subtitle">
      By: Manuela Sarmiento
    </div>



  <script src="home.js"></script>
</body>
</html>
